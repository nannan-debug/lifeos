name: iOS Build

# 什么时候触发：
# - 推到 main（确保主分支永远能编译）
# - 任何对着 main 的 PR
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (iOS Simulator)
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app
      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Create stub Secrets.swift
        # 真 Secrets.swift 被 gitignore 了，用模板占位值，CI 只需编译不需真实 secret
        run: cp Secrets.example.swift Sources/Services/Secrets.swift

      - name: Generate Xcode project
        run: xcodegen

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild \
            -project PersonalSystem.xcodeproj \
            -scheme PersonalSystem \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build
