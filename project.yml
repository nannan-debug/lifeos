name: PersonalSystem
options:
  bundleIdPrefix: ai.anna
configs:
  Debug: debug
  Release: release
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: ai.anna.personalsystem
    IPHONEOS_DEPLOYMENT_TARGET: 16.0
    SWIFT_VERSION: 5.9

targets:
  PersonalSystem:
    type: application
    platform: iOS
    sources:
      - Sources
    info:
      path: Sources/App/Info.plist
      properties:
        CFBundleShortVersionString: 1.0.0
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: LaunchBackground
          UIImageName: LaunchLogo
          UIImageRespectsSafeAreaInsets: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        CFBundleDisplayName: LifeOS
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_NAME: PersonalSystem
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "355RQ5S3DW"

  PersonalSystemTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: PersonalSystem
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.anna.personalsystem.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  PersonalSystem:
    build:
      targets:
        PersonalSystem: all
    test:
      targets:
        - PersonalSystemTests
      gatherCoverageData: false
