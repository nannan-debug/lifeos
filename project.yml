name: PersonalSystem
options:
  bundleIdPrefix: ai.anna
configs:
  Debug: debug
  Release: release
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: ai.anna.personalsystem
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
    SWIFT_VERSION: 5.9

targets:
  PersonalSystem:
    type: application
    platform: iOS
    sources:
      - path: Sources
        excludes:
          - Widgets/**
      - Shared
    dependencies:
      - target: CheckWidgetExtension
        embed: true
    info:
      path: Sources/App/Info.plist
      properties:
        CFBundleShortVersionString: 1.8.0
        CFBundleVersion: "12"
        ITSAppUsesNonExemptEncryption: false
        UILaunchStoryboardName: LaunchScreen
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        CFBundleURLTypes:
          - CFBundleURLName: ai.anna.personalsystem
            CFBundleURLSchemes:
              - lifeos
        CFBundleDisplayName: LifeOS
        NSHealthShareUsageDescription: 用于把你授权的睡眠和运动时间同步到 LifeOS 时间记录中。
        NSHealthUpdateUsageDescription: 用于把你授权同步的健康数据转成 LifeOS 本地时间记录。
        UIRequiresFullScreen: true
        UIUserInterfaceStyle: Light
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_NAME: PersonalSystem
        MARKETING_VERSION: 1.8.0
        CURRENT_PROJECT_VERSION: 12
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: Sources/App/PersonalSystem.entitlements
        DEVELOPMENT_TEAM: "355RQ5S3DW"

  PersonalSystemTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: PersonalSystem
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.anna.personalsystem.tests
        GENERATE_INFOPLIST_FILE: YES

  CheckWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - Sources/Widgets/CheckWidget
      - Shared
    info:
      path: Sources/Widgets/CheckWidget/Info.plist
      properties:
        CFBundleDisplayName: LifeOS
        CFBundleShortVersionString: 1.8.0
        CFBundleVersion: "12"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_NAME: CheckWidgetExtension
        PRODUCT_BUNDLE_IDENTIFIER: ai.anna.personalsystem.CheckWidgetExtension
        MARKETING_VERSION: 1.8.0
        CURRENT_PROJECT_VERSION: 12
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: Sources/Widgets/CheckWidget/CheckWidget.entitlements
        DEVELOPMENT_TEAM: "355RQ5S3DW"

schemes:
  PersonalSystem:
    build:
      targets:
        PersonalSystem: all
    test:
      targets:
        - PersonalSystemTests
      gatherCoverageData: false
